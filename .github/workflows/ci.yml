---
name: CI

# yamllint disable-line rule:truthy
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-repository:
    uses: timmo001/workflows/.github/workflows/lint-general.yml@c7e580685718ad4e83b85325d14e1970f6f44661  # master

  validate-renovate:
    name: Validate Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Check out files
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          submodules: true
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: vendor/frontend/.nvmrc
      - name: Validate Renovate configuration
        run: yarn renovate:validate

  frontend:
    name: Frontend demo
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_OPTIONS: --max_old_space_size=6144
      SKIP_FETCH_NIGHTLY_TRANSLATIONS: "true"
    steps:
      - name: Check out files
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          submodules: true
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: vendor/frontend/.nvmrc
      - name: Prepare demo
        run: yarn prepare:demo
      - name: Install Playwright
        run: yarn playwright:install
      - name: Lint, build, and test
        run: yarn ci
      - name: Upload demo
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: home-assistant-demo
          path: dist/
          if-no-files-found: error
          retention-days: 7
